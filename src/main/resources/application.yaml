spring:
  application:
    name: WealthTech
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      embedding:
        options:
          model: text-embedding-3-small
      chat:
        enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/wealthtech
    username: wealthtech
    password: wealthtech
    driver-class-name: org.postgresql.Driver

management:
  endpoints:
    web:
      exposure:
        include: health,metrics

enrichment:
  scheduler:
    fixed-delay-ms: 1000
  processor:
    pool-size: 4

search:
  pool-size: 4
  client-timeout-ms: 5000
  document-timeout-ms: 5000
